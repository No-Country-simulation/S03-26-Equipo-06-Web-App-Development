name: Backend CI CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms-api
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make mvnw executable
        run: git config core.autocrlf false && chmod +x ./mvnw

      - name: Build
        run: ./mvnw package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: cms-api/target/*.jar

  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cms-api
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make mvnw executable
        run: git config core.autocrlf false && chmod +x ./mvnw

      - name: Checkstyle
        run: ./mvnw checkstyle:check
