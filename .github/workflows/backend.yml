name: Backend CI CD

on:
  push:
    branches:
      - main
      - develop
      - 'dev*'
      - 'bac*'
      - 'fro*'
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches:
      - main
      - develop
      - 'dev*'
      - 'bac*'
      - 'fro*'
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make mvnw executable
        run: git config core.autocrlf false && chmod +x ./mvnw

      - name: Build
        run: ./mvnw package -DskipTests

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: backend-jar
          path: backend/target/*.jar

  scan:
    name: Run Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  lint:
    if: ${{ github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    needs: [build, scan]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Make mvnw executable
        run: git config core.autocrlf false && chmod +x ./mvnw

      - name: Checkstyle
        run: ./mvnw checkstyle:check

  build-and-deploy-dev:
    if: ${{ (github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch') && github.ref != 'refs/heads/main' }}
    needs: [lint]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    permissions:
      contents: 'read'
      id-token: 'write'
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker Auth
        run: gcloud auth configure-docker --quiet

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE_DEV }}" > .env

      - name: Build and push image
        run: |
          IMAGE_TAG="gcr.io/${{ secrets.GCP_PROJECT_ID }}/backend:${{ github.sha }}"
          docker build -t $IMAGE_TAG . 
          docker push $IMAGE_TAG

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: backend-dev
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/backend:${{ github.sha }}
          region: ${{ secrets.GCP_REGION }}
          flags: >
            --allow-unauthenticated

  build-and-deploy-prod:
    # if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main') }}
    # needs: [lint] 
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    permissions:
      contents: 'read'
      id-token: 'write'
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Docker Auth
        run: gcloud auth configure-docker --quiet

      - name: Create .env file
        run: |
          echo "${{ secrets.ENV_FILE_PROD }}" > .env

      - name: Build and push image
        run: |
          IMAGE_TAG="gcr.io/${{ secrets.GCP_PROJECT_ID }}/backend:${{ github.sha }}"
          docker build -t $IMAGE_TAG . 
          docker push $IMAGE_TAG

      - name: Deploy to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: backend
          image: gcr.io/${{ secrets.GCP_PROJECT_ID }}/backend:${{ github.sha }}
          region: ${{ secrets.GCP_REGION }}
          flags: >
            --allow-unauthenticated

  smoke-test-dev:
    runs-on: ubuntu-latest
    needs: build-and-deploy-dev

    steps:
      - name: Smoke test dev
        run: |
          URL="${{ needs.build-and-deploy-dev.outputs.url }}"
          echo "Testing DEV: $URL/health"
          curl -f --retry 5 --retry-delay 3 "$URL/health"

  smoke-test-prod:
    runs-on: ubuntu-latest
    needs: build-and-deploy-prod

    steps:
      - name: Smoke test prod
        run: |
          URL="${{ needs.build-and-deploy-prod.outputs.url }}"
          echo "Testing PROD: $URL/health"
          curl -f --retry 5 --retry-delay 3 "$URL/health"
